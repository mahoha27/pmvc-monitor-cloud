name: PMVC Daily Digest

on:
  schedule:
    # СТРАТЕГИЯ: насыщение cron schedule + idempotency.
    # GitHub Actions free-tier cron — НЕНАДЁЖЕН: scheduled runs могут быть
    # отложены (20 мин - 6 ч) или СКИПНУТЫ полностью (как May 4, May 5).
    # Документированный workaround: high-frequency cron получает приоритет
    # в GH scheduler. Поэтому каждые 10 мин 06:00-11:50 UTC = 36 попыток.
    # Idempotency (state.last_daily_sent_date) гарантирует ровно ОДИН send/день:
    # первый успешный run отмечает дату, остальные 35 видят и выходят за <1 сек.
    # Public repo → unlimited Actions minutes → стоимость 0.
    - cron: "*/10 6-11 * * *"  # каждые 10 мин 06:00-11:50 UTC = 09:00-14:50 Kyiv (EEST)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN: collect data, build digest, but DO NOT send to Telegram"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      force_resend:
        description: "FORCE_RESEND: bypass idempotency check (use only to re-send today's digest)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write  # для commit state.json обратно

# Один job в каждый момент. Если 06:00 ещё бежит когда стартует 06:30 — 06:30 ждёт.
concurrency:
  group: pmvc-daily
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          IPO_NEWS_CHAT_ID: ${{ secrets.IPO_NEWS_CHAT_ID }}
          TZ: Europe/Kiev
          # Scheduled runs: real send. Manual runs: default DRY_RUN=true (safe).
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '1' || '0' }}
          # FORCE_RESEND only via manual dispatch
          FORCE_RESEND: ${{ github.event_name == 'workflow_dispatch' && inputs.force_resend == 'true' && '1' || '0' }}
        run: python monitor.py daily

      - name: Commit updated state
        run: |
          git config user.name "pmvc-bot"
          git config user.email "actions@github.com"
          if [[ -n "$(git status --porcelain state.json 2>/dev/null)" ]]; then
            git add state.json
            git commit -m "state: daily run $(date -u +%Y-%m-%d_%H:%M)"
            # Pull --rebase в случае параллельных runs / external commits
            git pull --rebase --autostash origin main || true
            git push || (sleep 5 && git pull --rebase origin main && git push)
          else
            echo "No state changes to commit"
          fi
