name: PMVC Weekly Digest

on:
  schedule:
    # 17:00 UTC Sunday = 19:00 Sunday Europe/Kiev (UTC+2 круглый год)
    - cron: "0 17 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pmvc-weekly
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly synthesis
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          IPO_NEWS_CHAT_ID: ${{ secrets.IPO_NEWS_CHAT_ID }}
          TZ: Europe/Kiev
        run: python monitor.py weekly

      - name: Commit updated state
        run: |
          git config user.name "pmvc-bot"
          git config user.email "actions@github.com"
          if [[ -n "$(git status --porcelain state.json 2>/dev/null)" ]]; then
            git add state.json
            git commit -m "state: weekly run $(date -u +%Y-%m-%d_%H:%M)"
            git push
          else
            echo "No state changes"
          fi
